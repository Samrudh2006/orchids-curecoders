<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>CureCoders — AI-Powered Pharmaceutical Intelligence</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="AI-powered pharmaceutical intelligence platform for market analysis, patent research, and clinical data insights" />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CureCoders" />
    <meta name="application-name" content="CureCoders" />
    <meta name="msapplication-TileColor" content="#06b6d4" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon-180x180.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icon-16x16.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
            },
            colors: {
              primary: {
                DEFAULT: '#06b6d4', // Pharmaceutical Cyan
                light: '#22d3ee',
                dark: '#0891b2',
              },
              secondary: {
                DEFAULT: '#f59e0b', // Pharmaceutical Orange
                light: '#fbbf24',
                dark: '#d97706',
              },
              pharma: {
                blue: '#1e293b',
                cyan: '#06b6d4',
                orange: '#f59e0b',
                green: '#10b981',
                red: '#ef4444',
                purple: '#8b5cf6',
              }
            },
            animation: {
                'gradient-x': 'gradient-x 5s ease infinite',
                'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'float': 'float 8s ease-in-out infinite',
                'fade-in': 'fade-in 0.6s ease-out',
                'slide-up': 'slide-up 0.6s ease-out',
                'slide-in-right': 'slide-in-right 0.6s ease-out',
                'scale-in': 'scale-in 0.3s ease-out',
                'bounce-soft': 'bounce-soft 2s infinite',
            },
            keyframes: {
                'gradient-x': {
                    '0%, 100%': { 'background-position': '0% 50%' },
                    '50%': { 'background-position': '100% 50%' },
                },
                'float': {
                    '0%': { transform: 'translateY(0px)', opacity: 0.6 },
                    '50%': { transform: 'translateY(-25px)', opacity: 1 },
                    '100%': { transform: 'translateY(0px)', opacity: 0.6 },
                },
                'fade-in': {
                    '0%': { opacity: 0, transform: 'translateY(10px)' },
                    '100%': { opacity: 1, transform: 'translateY(0)' },
                },
                'slide-up': {
                    '0%': { opacity: 0, transform: 'translateY(30px)' },
                    '100%': { opacity: 1, transform: 'translateY(0)' },
                },
                'slide-in-right': {
                    '0%': { opacity: 0, transform: 'translateX(30px)' },
                    '100%': { opacity: 1, transform: 'translateX(0)' },
                },
                'scale-in': {
                    '0%': { opacity: 0, transform: 'scale(0.95)' },
                    '100%': { opacity: 1, transform: 'scale(1)' },
                },
                'bounce-soft': {
                    '0%, 20%, 53%, 80%, 100%': { transform: 'translateY(0)' },
                    '40%, 43%': { transform: 'translateY(-10px)' },
                    '70%': { transform: 'translateY(-5px)' },
                    '90%': { transform: 'translateY(-2px)' },
                }
            }
          }
        }
      }
    </script>
    <!-- PDF Export Libraries with Charts -->
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <!-- Excel Export Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- PowerPoint Export Library -->
    <script src="https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    
    <!-- Ensure libraries are loaded -->
    <script>
      window.addEventListener('load', function() {
        console.log('Libraries loaded:', {
          html2canvas: typeof html2canvas !== 'undefined',
          jsPDF: typeof window.jspdf !== 'undefined' && typeof window.jspdf.jsPDF !== 'undefined',
          Chart: typeof Chart !== 'undefined',
          XLSX: typeof XLSX !== 'undefined',
          PptxGenJS: typeof PptxGenJS !== 'undefined'
        });
        
        // Set up Chart.js defaults for pharmaceutical theme
        if (typeof Chart !== 'undefined') {
          Chart.defaults.font.family = 'Inter, sans-serif';
          Chart.defaults.color = '#334155';
          Chart.defaults.backgroundColor = '#f8fafc';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('CureCoders SW: Service worker registered successfully:', registration.scope);
              
              // Listen for updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New version available
                      if (confirm('A new version of CureCoders is available. Would you like to update?')) {
                        newWorker.postMessage({ action: 'skipWaiting' });
                        window.location.reload();
                      }
                    }
                  });
                }
              });
            })
            .catch((error) => {
              console.error('CureCoders SW: Service worker registration failed:', error);
            });
        });
      }

      // Handle PWA install prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show custom install button or banner
        console.log('CureCoders PWA: Install prompt available');
        
        // You can trigger the install prompt later with:
        // deferredPrompt.prompt().then((choiceResult) => {
        //   console.log('User choice:', choiceResult.outcome);
        //   deferredPrompt = null;
        // });
      });

      // Track PWA install
      window.addEventListener('appinstalled', () => {
        console.log('CureCoders PWA: App installed successfully');
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
