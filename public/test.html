<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔧 CureCoders Debug Test</h1>
        <p>✅ Server is working</p>
        <p>✅ Static files are served</p>
        <p>Current time: <span id="time"></span></p>
    </div>
    
    <div class="box">
        <h2>🧪 JavaScript Test</h2>
        <button onclick="testJS()">Test JavaScript</button>
        <p id="jsResult"></p>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        
        function testJS() {
            document.getElementById('jsResult').innerHTML = '✅ JavaScript is working!';
        }
        
        console.log('Test page loaded successfully');
    </script>
</body>
</html>
